<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory — Kapet Pamana</title>
<link rel="icon" type="image/png" href="../images/kapet_logo.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<link rel="stylesheet" href="../css/main.css">
</head>
<body data-page="inventory_alert">

<div class="wrapper">

  <!-- ══ SIDEBAR ══ -->
  <nav id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <img src="../images/kapet_logo.png" alt="Kapet Pamana Logo">
      </div>
      <h4>Kapet Pamana</h4>
    </div>
    <ul class="sidebar-nav">
      <li><a data-page="dashboard"    href="../index.html"><i class="bi bi-grid-1x2-fill"></i>Dashboard</a></li>
      <li><a data-page="inventory"    href="inventory.html"><i class="bi bi-box-seam"></i>Inventory</a></li>
      <li><a data-page="inventory_alert" href="inventory_alert.html"><i class="bi bi-box-seam"></i>Inventory Alerts</a></li>
      <li><a data-page="users"        href="users.html"><i class="bi bi-people"></i>Users</a></li>
      <li><a data-page="complaints"   href="complaints.html"><i class="bi bi-chat-dots"></i>Complaints</a></li>
      <li><a data-page="transactions" href="transactions.html"><i class="bi bi-receipt"></i>Transactions</a></li>
    </ul>
    <div class="sidebar-profile">
      <div class="profile-avatar">C</div>
      <div>
        <div class="profile-name">Coffee_Master67</div>
        <div class="profile-role">Administrator</div>
      </div>
    </div>
  </nav>

  <!-- ══ MAIN ══ -->
  <div class="content" id="mainContent">

    <div class="topbar">
      <div class="topbar-left">
        <button class="toggle-btn" id="toggleSidebar"><i class="bi bi-list"></i></button>
        <span class="page-title">Inventory Alerts</span>
      </div>
      <div class="topbar-right">
        <button class="topbar-icon-btn"><i class="bi bi-search"></i></button>
        <button class="topbar-icon-btn"><i class="bi bi-bell"></i><span class="notif-dot"></span></button>
        <div class="profile-avatar">C</div>
      </div>
    </div>

    <!-- page-area: header + table shrink together when panel opens -->
    <div class="page-area" id="inventoryPageArea">

      <!-- Page header (title + controls) -->
      <div class="page-header">
        <div class="page-header-title">
          <button class="add-btn" id="addProductBtn" title="Add product"><i class="bi bi-plus"></i></button>
          Inventory
        </div>
        <div class="page-header-controls">
          <button class="header-icon-btn" title="Sort"><i class="bi bi-sort-down"></i></button>
          <button class="categories-btn"><i class="bi bi-funnel-fill"></i>Categories</button>
          <div class="search-box">
            <i class="bi bi-search"></i>
            <input type="text" id="inventorySearch" placeholder="Search…">
          </div>
        </div>
      </div>

      <!-- Table -->
      <div class="split-layout">
        <div class="split-table-wrap">
          <div class="table-scroll">
            <table class="dash-table" id="inventoryTable">
              <thead>
                <tr>
                  <th>Rule Name</th>
                  <th>Product Name</th>
                  <th>Attribute</th>
                  <th>Condition</th>
                  <th>Value</th>
                  <th>Category</th>
                  <th>Enabled</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>

    </div><!-- /page-area -->

  </div><!-- /content -->

  <!-- ══ EDIT PANEL — opens on row click ══ -->
  <aside class="slide-panel" id="inventoryPanel">
    <div class="panel-scroll">
      <div class="panel-header">
        <div class="panel-title" id="inventoryPanelTitle">Edit Product</div>
        <button class="panel-close-btn" id="panelCancelBtn"><i class="bi bi-x"></i></button>
      </div>

      <!-- <div class="panel-image-block">
        <div class="panel-img-placeholder" id="panelImgWrap">
          <i class="bi bi-image"></i>
        </div>
        <div class="panel-img-actions">
          <button class="btn btn-outline btn-sm">Add Image</button>
          <button class="btn btn-outline btn-sm">Remove Image</button>
        </div>
      </div>  -->  

      <div class="form-group">
        <label class="form-label">Rule Name</label>
        <input type="text" class="form-control" id="pruleName" placeholder="Rule name">
      </div>

      <div class="form-group">
        <label class="form-label">Category</label>
        <select id="pCategory" class="form-control" name="">
          <option value="CnS_Drinks">Cold & Specialty Drinks</option>
          <option value="HM_Baskets">Hand-Made Baskets</option>
          <option value="CP_Mug">Clay-Pot Mug</option>
          <option value="C_Sets">Coaster Set</option>
        </select>
      </div>
      

      <div class="form-group">
        <label class="form-label">Name</label>
        <input type="text" class="form-control" id="pName" placeholder="Product name">
      </div>

      <div class="form-row cols-2">
        <div class="form-group">
          <label class="form-label">Attribute</label>
            <select id="pAttribute" class="form-control" name="">
              <option value="Quantity">Quantity</option>
            </select>
        </div>
        <div class="form-group">
          <label class="form-label">Condition</label>
          
            <select id="pCondition" class="form-control" name="">
              <option value="GT">Greater Than</option>
              <option value="LT">Less Than</option>
              <option value="EQ">Equal To</option>
              <option value="GTE">Greater Than or Equal To</option>
              <option value="LTE">Less Than or Equal To</option>
            </select>
          
        </div>
      </div>

      <div class="form-row cols-2">
        <div class="form-group">
          <label class="form-label">Value</label>
          <input type="number" class="form-control" id="pValue" placeholder="0">
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select name="" id="pStatus" class="form-control">
            <option value="Available">Available</option>
            <option value="Unavailable">Unavailable</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Footer changes based on mode: edit shows Delete+Update, add shows just Add -->
    <div class="panel-footer" id="inventoryPanelFooter-edit">
      <button class="btn btn-delete" id="panelDeleteBtn">Delete</button>
      <button class="btn btn-update" id="panelUpdateBtn">Update</button>
    </div>
    <div class="panel-footer" id="inventoryPanelFooter-add" style="display:none">
      <button class="btn btn-cancel" id="panelAddCancelBtn">Cancel</button>
      <button class="btn btn-primary" id="panelAddConfirmBtn">Add Product</button>
    </div>
  </aside>
</div><!-- /wrapper -->

<script src="../js/nav.js"></script>
<script src="../js/panel.js"></script>
<script src="../js/inventory_alert.js"></script>
</body>
</html>
