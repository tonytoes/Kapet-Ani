<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complaints — Kapet Pamana</title>
<link rel="icon" type="image/png" href="../images/kapet_logo.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<link rel="stylesheet" href="../css/main.css">
</head>
<body data-page="complaints">

<div class="wrapper">

  <nav id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <img src="../images/kapet_logo.png" alt="Kapet Pamana Logo">
      </div>
      <h4>Kapet Pamana</h4>
    </div>
    <ul class="sidebar-nav">
      <li><a data-page="dashboard"    href="../index.html"><i class="bi bi-grid-1x2-fill"></i>Dashboard</a></li>
      <li><a data-page="inventory"    href="inventory.html"><i class="bi bi-box-seam"></i>Inventory</a></li>
      <li><a data-page="users"        href="users.html"><i class="bi bi-people"></i>Users</a></li>
      <li><a data-page="complaints"   href="complaints.html"><i class="bi bi-chat-dots"></i>Complaints</a></li>
      <li><a data-page="transactions" href="transactions.html"><i class="bi bi-receipt"></i>Transactions</a></li>
    </ul>
    <div class="sidebar-profile">
      <div class="profile-avatar">C</div>
      <div>
        <div class="profile-name">Coffee_Master67</div>
        <div class="profile-role">Administrator</div>
      </div>
    </div>
  </nav>

  <div class="content" id="mainContent">

    <div class="topbar">
      <div class="topbar-left">
        <button class="toggle-btn" id="toggleSidebar"><i class="bi bi-list"></i></button>
        <span class="page-title" id="pageTitle">Complaints</span>
      </div>
      <div class="topbar-right">
        <button class="topbar-icon-btn"><i class="bi bi-search"></i></button>
        <button class="topbar-icon-btn"><i class="bi bi-bell"></i><span class="notif-dot"></span></button>
        <div class="profile-avatar">C</div>
      </div>
    </div>

    <!-- ══ TABLE VIEW ══ -->
    <div id="tableView" style="display:flex; flex-direction:column; flex:1; overflow:hidden;">

      <div class="page-header" style="justify-content:space-between">
        <div class="page-header-title" style="font-size:1.15rem">Complaints</div>
        <div class="page-header-controls">
          <button class="header-icon-btn" title="Sort"><i class="bi bi-sort-down"></i></button>
          <div class="search-box">
            <i class="bi bi-search"></i>
            <input type="text" id="complaintsSearch" placeholder="Search…">
          </div>
        </div>
      </div>

      <div class="full-table-wrap">
        <div class="table-scroll">
          <table class="dash-table" id="complaintsTable">
            <thead>
              <tr>
                <th>Complaint ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>Title</th>
                <th>Date</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

    </div><!-- /tableView -->

    <!-- ══ DETAIL VIEW ══ -->
    <div class="complaint-detail-wrap" id="detailView">

      <!-- Back button -->
      <div class="complaint-detail-topbar">
        <button class="back-btn" id="backBtn" title="Back to complaints">
          <i class="bi bi-chevron-left"></i>
        </button>
      </div>

      <!-- Sender info -->
      <div class="complaint-sender">
        <div class="complaint-sender-avatar" id="detailAvatar">?</div>
        <div class="complaint-sender-info">
          <div class="complaint-sender-name" id="detailUsername">—</div>
          <div class="complaint-sender-email" id="detailEmail">—</div>
        </div>
        <span class="badge" id="detailBadge"></span>
      </div>

      <!-- Message -->
      <div class="complaint-message-body">
        <div class="complaint-message-title" id="detailTitle">—</div>
        <p class="complaint-message-text" id="detailMessage">—</p>
      </div>

      <!-- Actions -->
      <div class="complaint-detail-footer">
        <button class="btn btn-resolve" id="resolveBtn">Mark as Resolved</button>
        <button class="btn btn-reply" id="replyBtn">Reply</button>
      </div>

    </div><!-- /detailView -->

  </div><!-- /content -->
</div><!-- /wrapper -->

<script src="../js/nav.js"></script>
<script src="../js/complaints.js"></script>
</body>
</html>
