<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pages — Kapet Pamana</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<link rel="stylesheet" href="../css/main.css">
</head>
<body data-page="pages">

<div class="wrapper">

  <nav id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <img src="../images/kapet_logo.png" alt="Kapet Pamana Logo">
      </div>
      <h4>Kapet Pamana</h4>
    </div>
    <ul class="sidebar-nav">
      <li><a data-page="dashboard"    href="../index.html"><i class="bi bi-grid-1x2-fill"></i>Dashboard</a></li>
      <li><a data-page="inventory"    href="inventory.html"><i class="bi bi-box-seam"></i>Inventory</a></li>
      <li><a data-page="users"        href="users.html"><i class="bi bi-people"></i>Users</a></li>
      <li><a data-page="complaints"   href="complaints.html"><i class="bi bi-chat-dots"></i>Complaints</a></li>
      <li><a data-page="transactions" href="transactions.html"><i class="bi bi-receipt"></i>Transactions</a></li>
      <li><a data-page="pages"        href="pages.html"><i class="bi bi-file-earmark-text"></i>Pages</a></li>
    </ul>
    <div class="sidebar-profile">
      <div class="profile-avatar">C</div>
      <div>
        <div class="profile-name">Coffee_Master67</div>
        <div class="profile-role">Administrator</div>
      </div>
    </div>
  </nav>

  <div class="content" id="mainContent">

    <div class="topbar">
      <div class="topbar-left">
        <button class="toggle-btn" id="toggleSidebar"><i class="bi bi-list"></i></button>
        <span class="page-title">Pages</span>
      </div>
      <div class="topbar-right">
        <button class="topbar-icon-btn"><i class="bi bi-search"></i></button>
        <button class="topbar-icon-btn"><i class="bi bi-bell"></i><span class="notif-dot"></span></button>
        <div class="profile-avatar">C</div>
      </div>
    </div>

    <div class="pages-layout page-body full-height" style="padding:16px 26px 26px">

      <!-- List -->
      <div class="pages-list-panel">
        <div class="pages-list-item active" data-target="homepage">
          Homepage <i class="bi bi-chevron-right"></i>
        </div>
        <div class="pages-list-item" data-target="aboutus">
          About Us <i class="bi bi-chevron-right"></i>
        </div>
        <div class="pages-list-item" data-target="contacts">
          Contacts <i class="bi bi-chevron-right"></i>
        </div>
      </div>

      <!-- Editor -->
      <div class="pages-editor-panel">
        <div class="pages-editor-body">
          <div class="pages-editor-title" id="editorTitle">Home Page</div>

          <div id="homepageFields">
            <div class="form-group">
              <label class="form-label">Main Heading</label>
              <!-- JS variable: homepageHeading -->
              <input type="text" class="form-control" id="homepageHeading" value="Kapi't Ani">
            </div>
            <div class="form-group">
              <label class="form-label">Sub Heading</label>
              <!-- JS variable: homepageSubheading -->
              <textarea class="form-control" id="homepageSubheading" rows="4">It is best to start your day with a cup of coffee. Discover the best flavours coffee you will ever have.</textarea>
            </div>
          </div>

          <div id="aboutusFields" style="display:none">
            <div class="form-group">
              <label class="form-label">About Heading</label>
              <input type="text" class="form-control" id="aboutHeading" placeholder="About Us heading…">
            </div>
            <div class="form-group">
              <label class="form-label">About Body</label>
              <textarea class="form-control" id="aboutBody" rows="6" placeholder="Tell your story…"></textarea>
            </div>
          </div>

          <div id="contactsFields" style="display:none">
            <div class="form-group">
              <label class="form-label">Contact Email</label>
              <input type="email" class="form-control" id="contactEmail" placeholder="contact@kapetpamana.com">
            </div>
            <div class="form-group">
              <label class="form-label">Contact Phone</label>
              <input type="text" class="form-control" id="contactPhone" placeholder="+63 912 345 6789">
            </div>
            <div class="form-group">
              <label class="form-label">Address</label>
              <textarea class="form-control" id="contactAddress" rows="3" placeholder="Store address…"></textarea>
            </div>
          </div>
        </div>

        <div class="pages-editor-footer">
          <button class="btn btn-cancel" style="max-width:160px" id="pagesCancelBtn">Cancel</button>
          <button class="btn btn-update" style="max-width:160px" id="pagesUpdateBtn">Update</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="../js/nav.js"></script>
<script src="../js/pages.js"></script>
</body>
</html>
