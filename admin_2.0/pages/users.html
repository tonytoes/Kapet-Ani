<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Users — Kapet Pamana</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<link rel="stylesheet" href="../css/main.css">
</head>
<body data-page="users">

<div class="wrapper">

  <nav id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <img src="../images/kapet_logo.png" alt="Kapet Pamana Logo">
      </div>
      <h4>Kapet Pamana</h4>
    </div>
    <ul class="sidebar-nav">
      <li><a data-page="dashboard"    href="../index.html"><i class="bi bi-grid-1x2-fill"></i>Dashboard</a></li>
      <li><a data-page="inventory"    href="inventory.html"><i class="bi bi-box-seam"></i>Inventory</a></li>
      <li><a data-page="users"        href="users.html"><i class="bi bi-people"></i>Users</a></li>
      <li><a data-page="complaints"   href="complaints.html"><i class="bi bi-chat-dots"></i>Complaints</a></li>
      <li><a data-page="transactions" href="transactions.html"><i class="bi bi-receipt"></i>Transactions</a></li>
      <li><a data-page="pages"        href="pages.html"><i class="bi bi-file-earmark-text"></i>Pages</a></li>
    </ul>
    <div class="sidebar-profile">
      <div class="profile-avatar">C</div>
      <div>
        <div class="profile-name">Coffee_Master67</div>
        <div class="profile-role">Administrator</div>
      </div>
    </div>
  </nav>

  <div class="content" id="mainContent">

    <div class="topbar">
      <div class="topbar-left">
        <button class="toggle-btn" id="toggleSidebar"><i class="bi bi-list"></i></button>
        <span class="page-title">Users</span>
      </div>
      <div class="topbar-right">
        <button class="topbar-icon-btn"><i class="bi bi-search"></i></button>
        <button class="topbar-icon-btn"><i class="bi bi-bell"></i><span class="notif-dot"></span></button>
        <div class="profile-avatar">C</div>
      </div>
    </div>

    <!-- page-area: header + table shrink together when panel opens -->
    <div class="page-area" id="usersPageArea">

      <div class="page-header">
        <div class="page-header-title">
          <button class="add-btn" id="addUserBtn" title="Add user"><i class="bi bi-plus"></i></button>
          Users
        </div>
        <div class="page-header-controls">
          <button class="header-icon-btn" title="Sort"><i class="bi bi-sort-down"></i></button>
          <button class="categories-btn"><i class="bi bi-funnel-fill"></i>Categories</button>
          <div class="search-box">
            <i class="bi bi-search"></i>
            <input type="text" id="usersSearch" placeholder="Search…">
          </div>
        </div>
      </div>

      <div class="split-layout">
        <div class="split-table-wrap">
          <div class="table-scroll">
            <table class="dash-table" id="usersTable">
              <thead>
                <tr>
                  <th>User ID</th>
                  <th>Username</th>
                  <th>Email</th>
                  <th>Password</th>
                  <th>Total Spent</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>

    </div><!-- /page-area -->

  </div><!-- /content -->

  <!-- ══ RIGHT PANEL — fixed sidebar ══ -->
  <aside class="slide-panel" id="usersPanel">
    <div class="panel-scroll">
      <div class="panel-header">
        <div class="panel-title">Edit User</div>
        <button class="panel-close-btn" id="userCancelBtn"><i class="bi bi-x"></i></button>
      </div>

      <div class="panel-image-block">
        <div class="panel-img-placeholder" id="userImgWrap">
          <i class="bi bi-person"></i>
        </div>
        <div class="panel-img-actions">
          <button class="btn btn-outline btn-sm">Add Image</button>
          <button class="btn btn-outline btn-sm">Remove Image</button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" class="form-control" id="uUsername" placeholder="Username">
      </div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" id="uEmail" placeholder="email@example.com">
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="text" class="form-control" id="uPassword" placeholder="Password">
      </div>

      <div class="form-group">
        <label class="form-label">Status</label>
        <input type="text" class="form-control" id="uStatus" placeholder="Customer / Admin">
      </div>
    </div>

    <div class="panel-footer">
      <button class="btn btn-delete" id="userDeleteBtn">Delete</button>
      <button class="btn btn-update" id="userUpdateBtn">Update</button>
    </div>
  </aside>
  </div>
</div>

<script src="../js/nav.js"></script>
<script src="../js/panel.js"></script>
<script src="../js/users.js"></script>
</body>
</html>
