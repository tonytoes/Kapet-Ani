<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kape't Pamana | Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Karla:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="user_style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="logo">Kape't Pamana</div>
        <nav>
            <a href="#">Home</a>
            <a href="#" class="active">Products</a>
            <a href="#">Reviews</a>
            <a href="#">About</a>
        </nav>
    </header>

    <main class="profile-container">
        <aside class="glass-card sidebar">
            <div class="profile-pic">
                <img src="images/userprofile.jpg" alt="Profile">
            </div>
            <h3>Welcome Back</h3>
            <ul class="side-links">
                <li><i class="ri-edit-box-line"></i> Edit Profile</li>
                <li><i class="ri-user-line"></i> My Account</li>
                <li><i class="ri-shopping-cart-line"></i> Order History</li>
                <li><i class="ri-logout-box-r-line"></i> Logout</li>
            </ul>
        </aside>

        <section class="glass-card profile-form">
            <h2>My Profile</h2>
            <p>Manage and protect your account</p>
            <form id="profileForm">
                <div class="input-group">
                    <label>First Name</label>
                    <input type="text" id="firstName" placeholder="First Name">
                </div>
                <div class="input-group">
                    <label>Last Name</label>
                    <input type="text" id="lastName" placeholder="Last Name">
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Email">
                </div>
                <button type="submit" class="save-btn">Save changes</button>
            </form>
        </section>
    </main>

    <script src="user_script.js"></script>
</body>
</html>
